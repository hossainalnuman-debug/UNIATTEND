<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>UniAttend – Login</title>

  <!-- Bootstrap 5 -->
  <link rel="stylesheet" href="assets/bootstrap.min.css"/>
  <!-- Custom CSS -->
  <link rel="stylesheet" href="css/style.css"/>
  <!-- Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
</head>
<body class="login-body">

  <div class="login-wrapper">

    <!-- Card -->
    <div class="login-card">

      <!-- Header -->
      <div class="login-header text-center">
        <div class="login-logo mb-2">🎓</div>
        <h1 class="login-title">UniAttend</h1>
        <p class="login-subtitle">University Attendance Management System</p>
      </div>

      <!-- Body -->
      <div class="login-body-inner">

        <!-- Tab buttons -->
        <div class="portal-tabs mb-4">
          <button id="tabStudent" class="portal-tab active" onclick="switchTab('student')">
            <i class="bi bi-person-fill"></i> Student
          </button>
          <button id="tabTeacher" class="portal-tab" onclick="switchTab('teacher')">
            <i class="bi bi-mortarboard-fill"></i> Teacher
          </button>
        </div>

        <!-- Error alert -->
        <div id="loginError" class="alert alert-danger d-none" role="alert">
          <i class="bi bi-exclamation-triangle-fill me-2"></i>
          <span id="errorMsg">Invalid credentials.</span>
        </div>

        <!-- Login Form -->
        <form id="loginForm" onsubmit="handleLogin(event)">
          <input type="hidden" id="portalType" value="student"/>

          <div class="mb-3">
            <label class="form-label label-small">Email Address</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-envelope"></i></span>
              <input type="email" id="loginEmail" class="form-control"
                     placeholder="Enter your university email" required/>
            </div>
          </div>

          <div class="mb-4">
            <label class="form-label label-small">Password</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-lock"></i></span>
              <input type="password" id="loginPassword" class="form-control"
                     placeholder="Enter your password" required/>
              <button class="btn btn-outline-secondary" type="button" onclick="togglePassword()">
                <i class="bi bi-eye" id="eyeIcon"></i>
              </button>
            </div>
          </div>

          <button type="submit" class="btn btn-primary btn-login w-100">
            <i class="bi bi-box-arrow-in-right me-2"></i> Login
          </button>
        </form>

        <!-- Demo Accounts -->
        <div class="demo-section mt-4">
          <p class="demo-label">Demo Accounts</p>
          <div class="row g-2">
            <div class="col-6">
              <button class="btn btn-demo btn-demo-student w-100"
                      onclick="fillDemo('student')">
                <i class="bi bi-person me-1"></i> Student Demo
              </button>
            </div>
            <div class="col-6">
              <button class="btn btn-demo btn-demo-teacher w-100"
                      onclick="fillDemo('teacher')">
                <i class="bi bi-mortarboard me-1"></i> Teacher Demo
              </button>
            </div>
          </div>
          <div class="demo-hints mt-2">
            <small class="text-muted">Student: <code>rahim@uni.edu</code> / <code>1234</code></small><br/>
            <small class="text-muted">Teacher: <code>mostofa@uni.edu</code> / <code>admin123</code></small>
          </div>
        </div>

      </div><!-- /.login-body-inner -->
    </div><!-- /.login-card -->

    <p class="login-footer-text text-center mt-3">
      &copy; 2024 UniAttend &mdash; University Attendance System
    </p>
  </div>

  <!-- Bootstrap JS -->
  <script src="assets/bootstrap.bundle.min.js"></script>
  <!-- App JS -->
  <script src="js/auth.js"></script>
</body>
</html>
